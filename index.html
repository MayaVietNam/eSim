<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ gửi Email eSIM - EZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .loader {
            border-top-color: #ffffff;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-5xl mx-auto">
        <div class="bg-blue-700 rounded-t-xl p-6 text-white shadow-lg flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold"><i class="fas fa-paper-plane mr-2"></i> EZ eSIM Mail Sender</h1>
                <p class="text-blue-200 mt-1 text-sm md:text-base">Công cụ điền thông tin và gửi mail tự động qua Google Apps Script</p>
            </div>
            <div class="text-right">
                <button onclick="clearForm()" class="bg-blue-600 hover:bg-blue-800 text-white py-2 px-4 rounded-lg text-sm transition shadow-sm border border-blue-500">
                    <i class="fas fa-redo mr-1"></i> Làm mới Form
                </button>
            </div>
        </div>

        <form id="esimForm" class="bg-white rounded-b-xl shadow-lg p-6" onsubmit="sendEmail(event)">
            
            <div class="flex items-center justify-between mb-6 border-b border-gray-100 pb-4">
                <h2 class="text-lg font-bold text-gray-800"><i class="fas fa-edit text-gray-500 mr-2"></i>Nhập thông tin đơn hàng</h2>
                
                <!-- Phần chọn ngôn ngữ -->
                <div class="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200">
                    <label class="text-sm font-semibold text-gray-700"><i class="fas fa-language text-blue-500 mr-1"></i> Ngôn ngữ Email:</label>
                    <select id="email_language" class="border-none bg-transparent text-sm font-bold text-blue-700 focus:ring-0 outline-none cursor-pointer">
                        <option value="en">English (Tiếng Anh)</option>
                        <option value="vi">Vietnamese (Tiếng Việt)</option>
                    </select>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                
                <!-- Cột 1: Thông tin khách hàng & Đơn hàng -->
                <div class="space-y-5">
                    <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 h-full">
                        <h3 class="text-md font-bold text-blue-800 mb-4 border-b border-blue-200 pb-2">Thông tin Khách & Đơn hàng</h3>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email người nhận <span class="text-red-500">*</span></label>
                            <input type="email" id="customer_email" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" placeholder="khachhang@gmail.com">
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tên khách hàng <span class="text-gray-400 text-xs font-normal">(Không bắt buộc)</span></label>
                            <input type="text" id="customer_name" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" placeholder="Để trống cũng được">
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mã đơn hàng (Order Number) <span class="text-red-500">*</span></label>
                            <input type="text" id="order_number" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-blue-900 shadow-sm" placeholder="VD: TVLK-123456">
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tên gói cước</label>
                                <input type="text" id="package_name" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm text-sm" placeholder="VD: Thái Lan 5 Ngày">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Loại gói</label>
                                <input type="text" id="package_type" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm text-sm" placeholder="VD: Data Only">
                            </div>
                            <!-- Ô Nhập Link Check Data mới -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Link Check Data</label>
                                <input type="text" id="check_data_link" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm text-sm" placeholder="https://... (nếu có)">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Cột 2: Thông tin eSIM -->
                <div class="space-y-5">
                    <div class="bg-green-50 p-4 rounded-lg border border-green-100">
                        <h3 class="text-md font-bold text-green-800 mb-4 border-b border-green-200 pb-2">Dữ liệu eSIM</h3>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mã số ICCID <span class="text-red-500">*</span></label>
                            <input type="text" id="iccid" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-green-500 outline-none font-mono text-sm shadow-sm" placeholder="89852...">
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Link Ảnh QR Code <span class="text-red-500">*</span></label>
                            <input type="url" id="qr_code_image" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-green-500 outline-none text-sm shadow-sm" placeholder="https://... (.png / .jpg)">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Link cài đặt iOS</label>
                                <input type="text" id="ios_link" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-green-500 outline-none text-sm shadow-sm" placeholder="https://... (nếu có)">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Link Android (hoặc LPA)</label>
                                <p class="text-[11px] text-gray-500 mb-1">Hệ thống sẽ tự đổi mã LPA thành Link.</p>
                                <input type="text" id="android_lpa" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-green-500 outline-none text-sm shadow-sm" placeholder="LPA:1$... hoặc https://...">
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-purple-50 p-4 rounded-lg border border-purple-100">
                        <h3 class="text-md font-bold text-purple-800 mb-4 border-b border-purple-200 pb-2">Banner Khuyến mãi (Tùy chọn)</h3>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Link Ảnh Banner</label>
                            <input type="url" id="promo_banner_image" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-purple-500 outline-none text-sm shadow-sm" placeholder="https://... (để trống nếu không dùng)">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Link khi click vào Banner</label>
                            <input type="url" id="promo_banner_link" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-purple-500 outline-none text-sm shadow-sm" placeholder="https://... (để trống nếu không dùng)">
                        </div>
                    </div>
                </div>

            </div>

            <div class="mt-8 pt-6 border-t border-gray-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div id="status_message" class="text-sm font-medium min-h-[24px]"></div>
                
                <button type="submit" id="submitBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition flex items-center justify-center min-w-[200px]">
                    <span id="btnText"><i class="fas fa-paper-plane mr-2"></i> Gửi Email Ngay</span>
                    <div id="spinner" class="loader border-4 border-transparent border-t-white border-solid rounded-full w-5 h-5 ml-2 hidden"></div>
                </button>
            </div>

        </form>
    </div>

    <script>
        // =========================================================================
        // CẤU HÌNH HỆ THỐNG
        // =========================================================================
        
        // Dán link Apps Script MỚI NHẤT của bạn vào đây (Bắt buộc phải triển khai mới để tính năng dịch hoạt động)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxa_EFm094hqEFNWSSP5siNhw1EwJNnPa5dL3GvYPKQXn5H58HR6zOuqQDP--MQXfdj/exec"; 
        
        // Link Google Sheet
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/18XtBhNZW8J9CAL-L_XMUcIEYiX4_l0wR8br5Pi-cKoY/edit?gid=0#gid=0"; 

        // =========================================================================

        function clearForm() {
            if(confirm("Bạn có chắc muốn làm mới thông tin đơn hàng hiện tại?")) {
                const fields = ['customer_email', 'customer_name', 'order_number', 'package_name', 'package_type', 'check_data_link', 'iccid', 'qr_code_image', 'ios_link', 'android_lpa', 'promo_banner_image', 'promo_banner_link'];
                fields.forEach(field => {
                    const el = document.getElementById(field);
                    if(el) el.value = '';
                });
                document.getElementById('status_message').innerHTML = '';
            }
        }

        const getVal = (id) => {
            const el = document.getElementById(id);
            return el ? el.value.trim() : '';
        };

        async function sendEmail(event) {
            event.preventDefault();
            
            const statusMsg = document.getElementById('status_message');
            
            if(!GAS_URL || GAS_URL.trim() === "") {
                statusMsg.innerHTML = '<span class="text-red-600 font-bold"><i class="fas fa-exclamation-triangle mr-1"></i> LỖI: Cần dán Link Apps Script.</span>';
                return;
            }

            const formData = {
                sheet_url: SHEET_URL.trim(), 
                email_language: getVal('email_language'), // Lấy ngôn ngữ gửi sang GAS
                customer_email: getVal('customer_email'),
                customer_name: getVal('customer_name'),
                order_number: getVal('order_number'),
                package_name: getVal('package_name') || '-',
                package_type: getVal('package_type') || '-',
                check_data_link: getVal('check_data_link'), // Gửi link check data
                iccid: getVal('iccid'),
                qr_code_image: getVal('qr_code_image'),
                ios_link: getVal('ios_link') || '#',
                android_lpa: getVal('android_lpa') || '#',
                promo_banner_image: getVal('promo_banner_image'),
                promo_banner_link: getVal('promo_banner_link') || '#'
            };

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.innerText = "Đang xử lý...";
            spinner.classList.remove('hidden');
            statusMsg.innerHTML = '<span class="text-blue-600"><i class="fas fa-spinner fa-spin mr-1"></i> Đang kết nối tới máy chủ gửi mail...</span>';

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if(result.status === 'success') {
                    statusMsg.innerHTML = `<span class="text-green-600 font-bold"><i class="fas fa-check-circle mr-1"></i> Gửi email thành công cho ${formData.customer_email}! ${result.message.includes('Sheet') ? '(Đã lưu Sheet)' : ''}</span>`;
                } else {
                    statusMsg.innerHTML = `<span class="text-red-600 font-bold"><i class="fas fa-exclamation-triangle mr-1"></i> Lỗi hệ thống: ${result.message}</span>`;
                }

            } catch (error) {
                console.error("Lỗi:", error);
                statusMsg.innerHTML = '<span class="text-red-600 font-bold"><i class="fas fa-exclamation-triangle mr-1"></i> Lỗi mạng hoặc Link Apps Script bị sai. Vui lòng kiểm tra Console.</span>';
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Gửi Email Ngay';
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
